url: https://sondreskarsten.github.io/tidybrreg/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles, news]
  components:
    articles:
      text: Articles
      menu:
      - text: Getting started
        href: articles/tidybrreg.html
      - text: Norwegian business data
        href: articles/business-data.html
      - text: Building firm panels
        href: articles/panels.html
      - text: Governance research
        href: articles/governance.html
      - text: Tracking role changes
        href: articles/roller-cdc.html
      - text: "---"
      - text: Architecture
        href: articles/architecture.html

reference:
- title: Entity lookup
  desc: >
    Retrieve details for specific entities by organization number.
    See `vignette("tidybrreg")` for a complete walkthrough.
  contents:
  - brreg_entity
  - brreg_underenheter
  - brreg_children
  - brreg_validate

- title: Search
  desc: >
    Query the register by name, legal form, industry, geography,
    and other criteria. Supports both main entities and sub-entities.
  contents:
  - brreg_search

- title: Roles and governance
  desc: >
    Board members, officers, auditors, and inter-company role
    relationships. See `vignette("governance")` for network analysis
    and `vignette("roller-cdc")` for change detection.
  contents:
  - brreg_roles
  - brreg_roles_legal
  - brreg_board_summary
  - brreg_board_network
  - brreg_network
  - brreg_survival_data
  - diff_roller_state

- title: Bulk downloads
  desc: >
    Download the full register as CSV or JSON. Three registries:
    enheter (~1M entities), underenheter (~950K sub-entities),
    roller (~5M role records).
  contents:
  - brreg_download
  - brreg_status
  - brreg_sync
  - brreg_sync_status

- title: Snapshot engine
  desc: >
    Save dated bulk downloads as Hive-partitioned Parquet files
    for panel construction and historical analysis.
    See `vignette("panels")` for workflows.
  contents:
  - brreg_snapshot
  - brreg_import
  - brreg_snapshots
  - brreg_open
  - brreg_cleanup
  - brreg_data_dir
  - brreg_manifest

- title: Panel construction and time series
  desc: >
    Build firm-period panels from snapshots, reconstruct state
    via CDC replay, compute aggregate time series, and convert
    to tsibble for the tidyverts ecosystem.
  contents:
  - brreg_panel
  - brreg_flows
  - brreg_changes
  - brreg_change_summary
  - brreg_replay
  - brreg_events
  - brreg_series
  - as_brreg_tsibble
  - brreg_annotations
  - brreg_annotation_summary

- title: Incremental updates (CDC)
  desc: >
    Fetch change events from the brreg API's change data capture
    stream. Supports enheter, underenheter, and roller.
  contents:
  - brreg_updates

- title: Labels and translation
  desc: >
    Translate Norwegian codes to English descriptions.
    Follows the eurostat package's `type = "label"` pattern.
  contents:
  - brreg_label
  - get_brreg_dic

- title: Harmonization
  desc: >
    Remap codes across classification changes (municipality
    boundary reforms, NACE reclassifications) using SSB KLASS.
  contents:
  - brreg_harmonize_kommune
  - brreg_harmonize_nace

- title: Reference data
  desc: >
    Bundled datasets mapping Norwegian codes to English names.
  contents:
  - field_dict
  - legal_forms
  - role_types
  - role_groups
