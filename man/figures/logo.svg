<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 232" width="200" height="232">
  <!-- Hex shape: navy fill, Norwegian red border -->
  <polygon points="100,2 194,58 194,174 100,230 6,174 6,58"
           fill="#00205B" stroke="#BA0C2F" stroke-width="3"/>
  <!-- Institution icon: pediment/roof -->
  <polygon points="80,72 100,58 120,72"
           fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Columns -->
  <line x1="85" y1="72" x2="85" y2="100" stroke="#ffffff" stroke-width="2"/>
  <line x1="100" y1="72" x2="100" y2="100" stroke="#ffffff" stroke-width="2"/>
  <line x1="115" y1="72" x2="115" y2="100" stroke="#ffffff" stroke-width="2"/>
  <!-- Base -->
  <rect x="80" y="100" width="40" height="3" rx="0.5" fill="#ffffff"/>
  <!-- Data rows emerging from institution -->
  <rect x="78" y="110" width="44" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <rect x="78" y="116" width="44" height="2.5" rx="0.5" fill="#ffffff" opacity="0.4"/>
  <rect x="78" y="122" width="44" height="2.5" rx="0.5" fill="#ffffff" opacity="0.3"/>
  <!-- Package name -->
  <text x="100" y="155" text-anchor="middle" fill="#FFFFFF"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold"
        letter-spacing="0.5">tidybrreg</text>
</svg>
